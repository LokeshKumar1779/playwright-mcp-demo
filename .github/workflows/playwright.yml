name: Deploy Playwright Report to GitHub Pages
on:
  push:
    branches:
      - main
      - master
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        browser: [chromium, firefox]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test --reporter=html --output=playwright-report --project=${{ matrix.browser }}
      - uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          publish_branch: gh-pages
      - name: Add link to report in summary
        run: |
          echo "## Test Report" >> $GITHUB_STEP_SUMMARY
          echo "[View Test Report](https://${{ github.actor }}.github.io/test/playwright-report/)" >> $GITHUB_STEP_SUMMARY
